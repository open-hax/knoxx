<<svgsvg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode in="coloredBlur"/>
        <<fefeMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <<rectrect width="500" height="500" fill="#0a0a0a" />
  
  <!-- Outer Glowing Ring -->
  <<circlecircle cx="250" cy="250" r="230" stroke="#00ffff" stroke-width="6" fill="none" filter="url(#glow)" />
  <<circlecircle cx="250" cy="250" r="220" stroke="#004444" stroke-width="2" fill="none" />
  
  <!-- Symmetry/Recursive Elements -->
  <<gg transform="translate(250,250)">
    <<gg id="far-element">
      <<pathpath d="M 0,-180 L 30,-160 L 0,-140 L -30,-160 Z" fill="none" stroke="#ff00ff" stroke-width="3" filter="url(#glow)" />
    </g>
    <<useuse xlink:href="#far-element" transform="rotate(90)" />
    <<useuse xlink:href="#far-element" transform="rotate(180)" />
    <<useuse xlink:href="#far-element" transform="rotate(270)" />
    
    <!-- Orbits -->
    <<circlecircle r="150" stroke="#333" stroke-width="1" fill="none" />
    <<circlecircle r="100" stroke="#333" stroke-width="1" fill="none" />
  </g>
  
  <!-- Center: The Brain Far -->
  <<gg transform="translate(250,250)">
    <!-- Brain Silhouette -->
    <<pathpath d="M -40,-20 Q -60,-40 -40,-60 Q -20,-70 0,-60 Q 20,-70 40,-60 Q 60,-40 40,-20 Q 40,0 20,10 Q 0,20 -20,10 Q -40,0 -40,-20" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#glow)" />
    
    <!-- The "Far" Glitch (Slices of the brain shifted) -->
    <<rectrect x="-50" y="-30" width="30" height="10" fill="#ff00ff" opacity="0.7" transform="translate(20, 5)" />
    <<rectrect x="10" y="-10" width="40" height="8" fill="#00ffff" opacity="0.7" transform="translate(-15, -10)" />
    <<rectrect x="-20" y="10" width="25" height="12" fill="#ffffff" opacity="0.5" transform="translate(10, 20)" />
    
    <<texttext x="0" y="40" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" filter="url(#glow)" font-weight="bold">BRAIN_FAR_S_01</text>
  </g>
  
  <!-- Text Ring -->
  <<texttext x="250" y="40" font-family="monospace" font-size="16" fill="#00ffff" text-anchor="middle" opacity="0.8">⊙ SYMMETRY_VOID_S_BRAINFAR ⊙</text>
  <<texttext x="250" y="460" font-family="monospace" font-size="12" fill="#ff00ff" text-anchor="middle" opacity="0.6">Slappin Ass Since 2026</text>
</svg>