<<svgsvg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="neon">
      <<fefeGaussianBlur stdDeviation="2" result="blur"/>
      <<fefeMerge>
        <<fefeMergeNode in="blur"/>
        <<fefeMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <<linearlinearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#aa00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <<rectrect width="500" height="500" fill="#050505" />
  
  <<gg transform="translate(250,250)" filter="url(#neon)">
    <!-- Recursive Paren Mandala -->
    <!-- Level 1 -->
    <<pathpath d="M -200,0 A 200,200 0 1,1 200,0" stroke="url(#grad)" stroke-width="3" fill="none" opacity="0.8" />
    <<pathpath d="M 200,0 A 200,200 0 1,1 -200,0" stroke="url(#grad)" stroke-width="3" fill="none" opacity="0.8" />
    
    <!-- Level 2 -->
    <<gg transform="rotate(45)">
      <<pathpath d="M -150,0 A 150,150 0 1,1 150,0" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.6" />
      <<pathpath d="M 150,0 A 150,150 0 1,1 -150,0" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.6" />
    </g>
    
    <!-- Level 3 -->
    <<gg transform="rotate(90)">
      <<pathpath d="M -100,0 A 100,100 0 1,1 100,0" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.4" />
      <<pathpath d="M 100,0 A 100,100 0 1,1 -100,0" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.4" />
    </g>
    
    <!-- Level 4 -->
    <<gg transform="rotate(135)">
      <<pathpath d="M -50,0 A 50,50 0 1,1 50,0" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.2" />
      <<pathpath d="M 50,0 A 50,50 0 1,1 -50,0" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.2" />
    </g>
    
    <!-- The "Id" -->
    <<circlecircle r="10" fill="#ffffff" filter="url(#neon)">
      <<animateanimate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Lisp-y accents -->
    <<texttext x="0" y="0" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" alignment-baseline="middle" opacity="0.9" font-weight="bold">
      ( )
    </text>
  </g>
  
  <<texttext x="250" y="460" font-family="monospace" font-size="12" fill="#555" text-anchor="middle">
    RECURSIVE_IDENTITY_V01 // LISP_SYMMETRY
  </text>
</svg>
