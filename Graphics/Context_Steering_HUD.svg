<<svgsvg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="3" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <<linearlinearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <<rectrect width="600" height="600" fill="#0a0a0f" />
  
  <!-- Steering Wheel / Compass -->
  <<gg transform="translate(300,300)">
    <<circlecircle r="250" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.2" />
    <<circlecircle r="240" stroke="#fff" stroke-width="1" fill="none" stroke-dasharray="10,10" opacity="0.3" />
    
    <!-- Crosshair / Steering Axes -->
    <<lineline x1="-250" y1="0" x2="250" y2="0" stroke="#fff" stroke-width="1" opacity="0.4" />
    <<lineline x1="0" y1="-250" x2="0" y2="250" stroke="#fff" stroke-width="1" opacity="0.4" />
    
    <!-- Dynamic Steering Indicators -->
    <<gg filter="url(#glow)">
      <<pathpath d="M 0,-200 L 20,-150 L 0,-100" stroke="#00ffcc" stroke-width="4" fill="none" />
      <<pathpath d="M 200,0 L 150,20 L 100,0" stroke="#00ffcc" stroke-width="4" fill="none" />
      <<pathpath d="M 0,200 L -20,150 L 0,100" stroke="#00ffcc" stroke-width="4" fill="none" />
      <<pathpath d="M -200,0 L -150,-20 L -100,0" stroke="#00ffcc" stroke-width="4" fill="none" />
    </g>
    
    <!-- Inner Core -->
    <<circlecircle r="60" fill="#000" stroke="url(#grad)" stroke-width="4" filter="url(#glow)" />
    <<texttext x="0" y="8" fill="#fff" font-family="monospace" font-size="18" text-anchor="middle" font-weight="bold">STEER</text>
  </g>
  
  <!-- HUD Elements -->
  <<texttext x="30" y="40" fill="#00ffcc" font-family="monospace" font-size="12" opacity="0.7">SENSING_CONTEXT... [OK]</text>
  <<texttext x="30" y="60" fill="#00ffcc" font-family="monospace" font-size="12" opacity="0.7">TRANSCRIPTION_SINK... [LEAKING]</text>
  <<texttext x="30" y="80" fill="#00ffcc" font-family="monospace" font-size="12" opacity="0.7">GOD_MODE_AUTH... [STABLE]</text>
  
  <<texttext x="570" y="570" fill="#fff" font-family="monospace" font-size="10" text-anchor="end" opacity="0.4">CONTEXT_SKEW :: 0.0042deg</text>
</svg>
