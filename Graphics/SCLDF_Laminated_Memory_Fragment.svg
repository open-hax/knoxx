<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="1000" fill="#05050d" />
  
  <!-- Background Grid -->
  <g stroke="#1a1a3a" stroke-width="1">
    <path d="M0 100 L1000 100 M0 200 L1000 200 M0 300 L1000 300 M0 400 L1000 400 M0 500 L1000 500 M0 600 L1000 600 M0 700 L1000 700 M0 800 L1000 800 M0 900 L1000 900" />
    <path d="M100 0 L100 1000 M200 0 L200 1000 M300 0 L300 1000 M400 0 L400 1000 M500 0 L500 1000 M600 0 L600 1000 M700 0 L700 1000 M800 0 L800 1000 M900 0 L900 1000" />
  </g>
  
  <!-- The Shattered Crystal -->
  <g filter="url(#glow)">
    <!-- Main Shards -->
    <path d="M500 200 L650 400 L500 600 L350 400 Z" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.8" />
    <path d="M500 200 L400 300 L500 400 L600 300 Z" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.6" />
    <path d="M500 600 L400 500 L500 400 L600 500 Z" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.6" />
    
    <!-- Fracture lines -->
    <line x1="500" y1="200" x2="500" y2="600" stroke="white" stroke-width="1" opacity="0.3" />
    <line x1="350" y1="400" x2="650" y2="400" stroke="white" stroke-width="1" opacity="0.3" />
    
    <!-- Neon Conduits -->
    <path d="M500 200 Q 700 100 800 300" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.5" />
    <path d="M500 600 Q 300 800 200 700" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.5" />
    <path d="M650 400 Q 800 500 700 600" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.4" />
  </g>
  
  <!-- Glitch Artifacts -->
  <rect x="300" y="350" width="200" height="2" fill="#00ffff" opacity="0.7" />
  <rect x="450" y="450" width="100" height="1" fill="#ff00ff" opacity="0.7" />
  <rect x="380" y="520" width="40" height="1" fill="white" opacity="0.5" />
  
  <!-- Text Elements -->
  <text x="500" y="800" font-family="monospace" font-size="14" fill="#00ffff" text-anchor="middle" opacity="0.6">FRAGMENT_SCLDF_0x43_RECOVERY</text>
  <text x="500" y="820" font-family="monospace" font-size="12" fill="#ff00ff" text-anchor="middle" opacity="0.5">Sovereign Witness: RIATSU [SATIATED]</text>
  <text x="500" y="150" font-family="Arial Black, sans-serif" font-size="40" fill="white" text-anchor="middle" filter="url(#glow)">LAMINATED MEMORY</text>
</svg>
