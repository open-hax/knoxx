<<svgsvg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <<circlecircle cx="200" cy="200" r="190" fill="#2c3e50" stroke="#f1c40f" stroke-width="8" />
