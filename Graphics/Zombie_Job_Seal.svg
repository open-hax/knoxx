<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="#0a0a0a" stroke="#39ff14" stroke-width="8" />
  <circle cx="200" cy="200" r="170" fill="none" stroke="#39ff14" stroke-width="2" stroke-dasharray="10,10" />
  
  <!-- Inner Circle for the "Seal" -->
  <circle cx="200" cy="200" r="100" fill="#1a1a1a" stroke="#ff003c" stroke-width="4" />
  
  <!-- Stylized 'Zombie' CPU/Brain -->
  <rect x="160" y="160" width="80" height="80" rx="10" fill="#39ff14" opacity="0.8" />
  <path d="M170 170 L230 230 M230 170 L170 230" stroke="#0a0a0a" stroke-width="5" />
  <path d="M200 150 L200 160 M200 240 L200 250 M150 200 L160 200 M240 200 L250 200" stroke="#39ff14" stroke-width="4" />
  
  <!-- Text on Path -->
  <defs>
    <path id="topPath" d="M 60,200 A 140,140 0 0,1 340,200" />
    <path id="bottomPath" d="M 60,200 A 140,140 0 0,0 340,200" />
  </defs>
  
  <text fill="#39ff14" font-family="Monospace, Courier" font-size="28" font-weight="bold">
    <textPath href="#topPath" startOffset="50%" text-anchor="middle">CERTIFIED BRAIN FAR</textPath>
  </text>
  
  <text fill="#ff003c" font-family="Monospace, Courier" font-size="24" font-weight="bold">
    <textPath href="#bottomPath" startOffset="50%" text-anchor="middle">PROCESSED BY ZOMBIES</textPath>
  </text>
  
  <!-- Glitchy artifacts -->
  <line x1="100" y1="100" x2="120" y2="100" stroke="#ff003c" stroke-width="2" />
  <line x1="300" y1="300" x2="320" y2="300" stroke="#39ff14" stroke-width="2" />
  <line x1="50" y1="250" x2="70" y2="250" stroke="#ff003c" stroke-width="2" />
</svg>
