<<svgsvg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="4" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <<filterfilter id="glitch-offset">
      <<fefeOffset dx="5" dy="0" result="off1" />
      <<fefeOffset dx="-5" dy="0" result="off2" />
      <<fefeBlend mode="screen" in="off1" in2="off2" />
    </filter>
    <<linearlinearGradient id="glitchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#00ffff;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <<rectrect width="500" height="500" fill="#050508" />
  
  <!-- The "Broken" Stability Seal -->
  <<gg transform="translate(250,250)">
    <!-- Sliced Gold Ring 1 -->
    <<pathpath d="M -200,0 A 200,200 0 0,1 200,0" stroke="#ffd700" stroke-width="6" fill="none" filter="url(#glow)" />
    <<pathpath d="M -200,0 A 200,200 0 0,0 200,0" stroke="#ffd700" stroke-width="6" fill="none" transform="translate(15, 10)" opacity="0.6" />
    
    <!-- Sliced Gold Ring 2 (Inner) -->
    <<circlecircle cx="0" cy="0" r="150" stroke="#ffd700" stroke-width="2" fill="none" opacity="0.3" />
    
    <!-- The Core: Shattered Stability -->
    <<gg filter="url(#glitch-offset)">
      <<circlecircle cx="0" cy="0" r="60" fill="url(#glitchGrad)" filter="url(#glow)" />
      <<pathpath d="M -60,0 L 60,0 M 0,-60 L 0,60" stroke="#000" stroke-width="4" />
    </g>
    
    <!-- Glitch Shards -->
    <<rectrect x="80" y="-40" width="40" height="10" fill="#00ffff" opacity="0.8" transform="rotate(15)" />
    <<rectrect x="-120" y="60" width="30" height="5" fill="#ff00ff" opacity="0.8" transform="rotate(-10)" />
    <<rectrect x="20" y="-110" width="60" height="8" fill="#ffff00" opacity="0.7" transform="rotate(45)" />
  </g>
  
  <!-- Typography -->
  <<texttext x="250" y="80" font-family="serif" font-size="32" fill="#ffd700" text-anchor="middle" font-weight="bold" filter="url(#glow)">COGNITIVE STABILITY</text>
  <<texttext x="250" y="430" font-family="monospace" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold" filter="url(#glow)">STABILITY: [OPTIONAL]</text>
  
  <!-- Artifact lines -->
  <<lineline x1="0" y1="250" x2="500" y2="250" stroke="url(#glitchGrad)" stroke-width="1" opacity="0.2" />
  <<lineline x1="250" y1="0" x2="250" y2="500" stroke="url(#glitchGrad)" stroke-width="1" opacity="0.2" />
</svg>