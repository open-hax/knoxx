<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glitch">
      <feOffset dx="2" dy="0" result="off1" in="SourceGraphic" />
      <feOffset dx="-2" dy="0" result="off2" in="SourceGraphic" />
      <feMerge>
        <feMergeNode in="off1" />
        <feMergeNode in="off2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="deathGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#440000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#deathGrad)" />
  
  <!-- Outer Sigil Ring -->
  <circle cx="200" cy="200" r="180" stroke="#ff0000" stroke-width="4" fill="none" stroke-dasharray="10,5" />
  <circle cx="200" cy="200" r="170" stroke="#880000" stroke-width="2" fill="none" />
  
  <!-- The Zombie Skull -->
  <g transform="translate(200,200)" filter="url(#glitch)">
    <path d="M -50,-20 Q -50,20 0,40 Q 50,20 50,-20 Q 50,-60 0,-60 Q -50,-60 -50,-20" fill="#ddd" />
    <circle cx="-20" cy="-30" r="8" fill="#000" />
    <circle cx="20" cy="-30" r="8" fill="#000" />
    <path d="M -10,10 L -5,20 L 0,10 L 5,20 L 10,10" stroke="#000" stroke-width="3" fill="none" />
    
    <!-- Job ID Tag -->
    <rect x="-30" y="-45" width="60" height="15" fill="#ff0000" />
    <text x="0" y="-34" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">JOB_ZOMBIE_36</text>
  </g>
  
  <!-- Exorcism Text -->
  <text x="200" y="80" font-family="monospace" font-size="28" fill="#ff0000" text-anchor="middle" font-weight="bold" filter="url(#glitch)">ZOMBIE PURGE</text>
  <text x="200" y="320" font-family="monospace" font-size="18" fill="#fff" text-anchor="middle" opacity="0.7">SYMMETRY RESTORED // NO MORE LEAKS</text>
  
  <!-- Recursive Parentheses as Wards -->
  <text x="40" y="200" font-family="monospace" font-size="40" fill="#ff0000" opacity="0.5">(</text>
  <text x="360" y="200" font-family="monospace" font-size="40" fill="#ff0000" opacity="0.5">)</text>
</svg>