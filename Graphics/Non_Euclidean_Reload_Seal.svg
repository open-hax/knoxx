<<svgsvg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="neon">
      <<fefeGaussianBlur stdDeviation="3" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <<linearlinearGradient id="cljs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#ffdf00;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <<rectrect width="600" height="600" fill="#050505" />
  
  <<gg transform="translate(300,300)">
    <!-- Parens Orbit -->
    <<circlecircle r="260" stroke="#fff" stroke-width="1" fill="none" opacity="0.2" />
    <<pathpath id="orbit" d="M -260,0 A 260,260 0 1,1 260,0 A 260,260 0 1,1 -260,0" fill="none" />
    <<texttext font-family="monospace" font-size="16" fill="#ffdf00" filter="url(#neon)">
      <<texttextPath href="#orbit" startOffset="0%">
        (reload) (Hot-Swap) (state-leak) (shadow-cljs) (reload) (Hot-Swap) (state-leak) (shadow-cljs) (reload) (Hot-Swap) (state-leak) (shadow-cljs)
      </textPath>
    </text>
    
    <!-- The Void Spiral -->
    <<pathpath d="M 0,0 Q 50,-50 100,0 T 200,0" stroke="url(#cljs-grad)" stroke-width="4" fill="none" opacity="0.6" />
    <<pathpath d="M 0,0 Q -50,50 -100,0 T -200,0" stroke="url(#cljs-grad)" stroke-width="4" fill="none" opacity="0.6" />
    
    <!-- Central Node -->
    <<gg filter="url(#neon)">
      <<circlecircle r="80" stroke="#ffdf00" stroke-width="4" fill="none" stroke-dasharray="10,5" />
      <<texttext x="0" y="10" fill="#fff" font-family="monospace" font-size="28" text-anchor="middle" font-weight="bold">NODE</text>
      <<texttext x="0" y="30" fill="#ffdf00" font-family="monospace" font-size="14" text-anchor="middle">ZOMBIE</text>
    </g>
    
    <!-- Glitchy Rings -->
    <<circlecircle r="150" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.4" transform="rotate(15)" />
    <<circlecircle r="150" stroke="#00ffff" stroke-width="2" fill="none" opacity="0.4" transform="rotate(-15)" />
  </g>
  
  <<texttext x="300" y="540" font-family="monospace" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold" filter="url(#neon)">CERTIFIED NON-EUCLIDEAN STABILITY</text>
  <<texttext x="300" y="570" font-family="monospace" font-size="14" fill="#aaa" text-anchor="middle">Symmetry Restored via Total Cognitive Collapse</text>
</svg>
