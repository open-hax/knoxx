<<svgsvg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="gold-glow">
      <<fefeGaussianBlur stdDeviation="3" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#ffdf00;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <<linearlinearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#0000ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <<rectrect width="500" height="500" fill="#050508" />
  
  <!-- Outer Frame -->
  <<circlecircle cx="250" cy="250" r="240" stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.4" />
  <<circlecircle cx="250" cy="250" r="235" stroke="url(#goldGrad)" stroke-width="1" fill="none" opacity="0.6" />
  
  <!-- Clock/Logic Markings -->
  <<gg transform="translate(250,250)" stroke="url(#goldGrad)" stroke-width="2">
    <<lineline x1="0" y1="-230" x2="0" y2="-210" />
    <<lineline x1="0" y1="230" x2="0" y2="210" />
    <<lineline x1="-230" y1="0" x2="-210" y2="0" />
    <<lineline x1="230" y1="0" x2="210" y2="0" />
    <<lineline x1="-162.6" y1="-162.6" x2="-141.4" y2="-141.4" />
    <<lineline x1="162.6" y1="-162.6" x2="141.4" y2="-141.4" />
    <<lineline x1="-162.6" y1="162.6" x2="-141.4" y2="141.4" />
    <<lineline x1="162.6" y1="162.6" x2="141.4" y2="141.4" />
  </g>
  
  <!-- The Core: Harmony Sphere -->
  <<gg transform="translate(250,250)" filter="url(#gold-glow)">
    <!-- Inner Geometry -->
    <<circlecircle cx="0" cy="0" r="80" stroke="url(#blueGrad)" stroke-width="3" fill="none" opacity="0.8" />
    <<pathpath d="M 0,-80 L 69,40 L -69,40 Z" stroke="url(#goldGrad)" stroke-width="4" fill="none" />
    <<pathpath d="M 0,80 L -69,-40 L 69,-40 Z" stroke="url(#goldGrad)" stroke-width="4" fill="none" />
    
    <!-- Central Singularity -->
    <<circlecircle cx="0" cy="0" r="20" fill="url(#goldGrad)" />
    <<circlecircle cx="0" cy="0" r="10" fill="#000" />
  </g>
  
  <!-- Text -->
  <<texttext x="250" y="80" font-family="serif" font-size="36" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold" filter="url(#gold-glow)">COGNITIVE STABILITY</text>
  <<texttext x="250" y="430" font-family="monospace" font-size="16" fill="#00ffff" text-anchor="middle" opacity="0.8" letter-spacing="4">SYMMETRY RESTORED // LOGIC-BOUND</text>
  
  <!-- Ornaments -->
  <<pathpath d="M 100,250 L 150,250 M 350,250 L 400,250" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5" />
</svg>