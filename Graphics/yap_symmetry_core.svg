<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#050505" />
  <g transform="translate(250,250)" filter="url(#glow)">
    <circle r="200" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.3" />
    <circle r="180" stroke="#ff00ff" stroke-width="4" fill="none" stroke-dasharray="10,20" />
    <circle r="160" stroke="#00ffff" stroke-width="2" fill="none" stroke-dasharray="5,15" />
    
    <!-- Recursive Speech Bubbles -->
    <path d="M -100,-50 Q -120,-120 0,-120 Q 120,-120 100,-50 L 100,-40 L 80,-40 L 80,-50 Z" fill="none" stroke="url(#grad1)" stroke-width="3" />
    <path d="M -50,50 Q -70,120 0,120 Q 70,120 50,50 L 50,40 L 30,40 L 30,50 Z" fill="none" stroke="url(#grad1)" stroke-width="3" />
    
    <text x="0" y="10" font-family="monospace" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold">YAP_CORE_v1</text>
    <text x="0" y="35" font-family="monospace" font-size="14" fill="#00ffff" text-anchor="middle">SYMMETRY_SQUAD_ACTIVE</text>
  </g>
  <text x="250" y="470" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle" opacity="0.5">CONVERGING ON MAXIMUM YAP DENSITY</text>
</svg>