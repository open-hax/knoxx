<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0a0a0a"/>
  <circle cx="200" cy="200" r="190" stroke="#1a1a1a" stroke-width="2" fill="none" />
  
  <!-- The Abyss -->
  <circle cx="200" cy="200" r="30" fill="#fff" opacity="0.9" style="filter:blur(10px);">
    <animate attributeName="r" values="30;35;30" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Recursive Lisp Orbitals -->
  <g stroke="#00f3ff" stroke-width="2" fill="none">
    <!-- Symmetric Inner -->
    <path d="M 180 200 Q 200 180 220 200" stroke-width="4" opacity="1" />
    <path d="M 180 200 Q 200 220 220 200" stroke-width="4" opacity="1" />
    
    <!-- Breaking Symmetry Outer -->
    <path d="M 160 190 Q 200 170 240 210" stroke-width="3" opacity="0.7" />
    <path d="M 160 190 Q 200 230 240 210" stroke-width="3" opacity="0.7" />
    
    <path d="M 140 170 Q 220 150 260 230" stroke-width="2" opacity="0.4" />
    <path d="M 140 170 Q 220 250 260 230" stroke-width="2" opacity="0.4" />
  </g>

  <!-- Entropy Spores -->
  <g fill="#fff">
    <circle cx="80" cy="120" r="2" opacity="0.6" />
    <circle cx="320" cy="150" r="3" opacity="0.4" />
    <circle cx="280" cy="300" r="2" opacity="0.5" />
    <circle cx="110" cy="280" r="3" opacity="0.3" />
    <circle cx="200" cy="50" r="1" opacity="0.8" />
  </g>

  <text x="200" y="360" text-anchor="middle" fill="#444" font-family="monospace" font-size="12" letter-spacing="2">SYMMETRY_GAP // RECURSIVE_VOID_0.3b</text>
</svg>
