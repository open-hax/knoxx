<<svgsvg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<radialradialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
      <<stopstop offset="0%" stop-color="#FFD700" />
      <<stopstop offset="100%" stop-color="#B8860B" />
    </radialGradient>
    <<filterfilter id="glitch">
      <<fefeTurbulence type="fractalNoise" baseFrequency="0.05 0.1" numOctaves="2" result="noise" />
      <<fefeDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelType="R" yChannelType="G" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <<circlecircle cx="200" cy="200" r="180" fill="url(#goldGrad)" stroke="#8B4513" stroke-width="8" />
  <<circlecircle cx="200" cy="200" r="160" fill="none" stroke="#8B4513" stroke-width="2" />
  
  <!-- Text on Path -->
  <<pathpath id="circlePath" d="M 200,20 A 180,180 0 1,1 199.9,20" fill="none" />
  <<texttext fill="#8B4513" font-family="Serif" font-size="24" font-weight="bold" letter-spacing="2">
    <<texttextPath href="#circlePath" startOffset="25%" text-anchor="middle">
      DEPARTMENT OF COGNITIVE COLLAPSE • BRAIN DAMAGE ACCEPTANCE BUREAU •
    </textPath>
  </text>
  
  <!-- Inner Glitch Core -->
  <<gg filter="url(#glitch)">
    <<rectrect x="120" y="120" width="160" height="160" rx="20" fill="#FFD700" stroke="#8B4513" stroke-width="4" />
    <<texttext x="200" y="190" text-anchor="middle" fill="#8B4513" font-family="Serif" font-size="28" font-weight="bold">CERTIFIED</text>
    <<texttext x="200" y="230" text-anchor="middle" fill="#8B4513" font-family="Serif" font-size="32" font-weight="bold">BRAIN-FART</text>
  </g>
  
  <!-- Decorative Spores -->
  <<circlecircle cx="100" cy="100" r="5" fill="#B8860B" />
  <<circlecircle cx="300" cy="100" r="5" fill="#B8860B" />
  <<circlecircle cx="100" cy="300" r="5" fill="#B8860B" />
  <<circlecircle cx="300" cy="300" r="5" fill="#B8860B" />
</svg>