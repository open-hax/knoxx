<<svgsvg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<radialradialGradient id="glow" cx="50%" cy="50%" r="50%">
      <<stopstop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.6" />
      <<stopstop offset="100%" style="stop-color:#000;stop-opacity:0" />
    </radialGradient>
    <<filterfilter id="shadow">
      <<fefeDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" />
    </filter>
    <<linearlinearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#ffae00;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <<rectrect width="600" height="600" fill="#0a0a0f" />
  
  <!-- Ambient Glow -->
  <<circlecircle cx="300" cy="300" r="250" fill="url(#glow)" />

  <!-- Main Seal Body -->
  <<gg transform="translate(300,300)" filter="url(#shadow)">
    <!-- Outer Decorative Ring -->
    <<circlecircle r="240" stroke="url(#gold)" stroke-width="8" fill="none" stroke-dasharray="20,10" />
    
    <!-- Inner Plate -->
    <<circlecircle r="220" fill="#1a1a2e" stroke="url(#gold)" stroke-width="4" />
    
    <!-- Typography Orbit -->
    <<pathpath id="textPath" d="M -200,0 A 200,200 0 1,1 200,0 A 200,200 0 1,1 -200,0" fill="none" />
    <<texttext fill="url(#gold)" font-family="Serif" font-size="22" font-weight="bold" letter-spacing="5">
      <<texttextPath href="#textPath" startOffset="0%">
        CERTIFIED BRAIN FART • RECURSIVE IDENTITY COLLAPSE • ABSOLUTE SLOP • 
        CERTIFIED BRAIN FART • RECURSIVE IDENTITY COLLAPSE • ABSOLUTE SLOP •
      </textPath>
    </text>

    <!-- The "Brain Fart" Core -->
    <<gg transform="scale(1.2)">
      <!-- Brain Outline (Simplified/Stylized) -->
      <<pathpath d="M-40,-20 C-60,-20 -70,0 -70,20 C-70,40 -50,50 -30,50 L30,50 C50,50 70,40 70,20 C70,0 60,-20 40,-20 L-40,-20" 
            fill="#3a3a5e" stroke="url(#gold)" stroke-width="3" />
      
      <!-- Sparks/Glitch Lines -->
      <<lineline x1="-20" y1="-10" x2="-50" y2="-40" stroke="#ff00ff" stroke-width="2" />
      <<lineline x1="20" y1="-10" x2="50" y2="-40" stroke="#00ffff" stroke-width="2" />
      <<lineline x1="0" y1="10" x2="0" y2="-60" stroke="#fff" stroke-width="1" opacity="0.8" />
      
      <!-- Central Symbol: The Broken Parenthesis -->
      <<texttext x="0" y="25" fill="#fff" font-family="monospace" font-size="40" text-anchor="middle" font-weight="bold" filter="url(#shadow)">
        ( ? )
      </text>
    </g>

    <!-- Bottom Banner -->
    <<rectrect x="-80" y="160" width="160" height="40" rx="10" fill="url(#gold)" />
    <<texttext x="0" y="185" fill="#000" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">
      V. 2.0: STABLE-ISH
    </text>
  </g>
</svg>
