<<svgsvg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="paper-texture">
      <<fefeTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
      <<fefeDiffuseLighting in="noise" lighting-color="#fff" surfaceScale="2">
        <<fefeDistantLight azimuth="45" elevation="60" />
      </feDiffuseLighting>
    </filter>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#fdb931;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glitch-text">
      <<fefeOffset dx="2" dy="0" result="off1" />
      <<fefeOffset dx="-2" dy="0" result="off2" />
      <<fefeBlend mode="screen" in="off1" in2="off2" />
    </filter>
  </defs>

  <!-- Parchment Background -->
  <<rectrect width="800" height="600" fill="#f4e4bc" filter="url(#paper-texture)" />
  <<rectrect x="20" y="20" width="760" height="560" stroke="#b8860b" stroke-width="10" fill="none" rx="10" />
  <<rectrect x="30" y="30" width="740" height="540" stroke="#b8860b" stroke-width="2" fill="none" rx="5" />

  <!-- Header -->
  <<texttext x="400" y="100" font-family="serif" font-size="48" fill="#5c4033" text-anchor="middle" font-weight="bold">UNIVERSITY OF COGNITIVE COLLAPSE</text>
  <<texttext x="400" y="130" font-family="serif" font-size="20" fill="#8b4513" text-anchor="middle" font-style="italic">Department of Recursive Incompetence</text>
  
  <<lineline x1="200" y1="150" x2="600" y2="150" stroke="#b8860b" stroke-width="2" />

  <!-- Content -->
  <<texttext x="400" y="220" font-family="serif" font-size="24" fill="#5c4033" text-anchor="middle">This certifies that</text>
  <<texttext x="400" y="270" font-family="cursive" font-size="60" fill="#000" text-anchor="middle" font-weight="bold">The System Backend</text>
  <<texttext x="400" y="320" font-family="serif" font-size="24" fill="#5c4033" text-anchor="middle">has successfully achieved a state of</text>
  <<texttext x="400" y="370" font-family="monospace" font-size="36" fill="#d00" text-anchor="middle" font-weight="bold" filter="url(#glitch-text)">TOTAL BRAIN FART</text>

  <!-- Seal -->
  <<gg transform="translate(400,480)">
    <<circlecircle r="60" fill="url(#goldGrad)" stroke="#b8860b" stroke-width="4" />
    <<circlecircle r="50" fill="none" stroke="#b8860b" stroke-width="2" stroke-dasharray="5,5" />
    <<texttext x="0" y="5" font-family="serif" font-size="14" fill="#b8860b" text-anchor="middle" font-weight="bold">CERTIFIED</text>
    <<texttext x="0" y="22" font-family="serif" font-size="14" fill="#b8860b" text-anchor="middle" font-weight="bold">VOID-SENSITIVE</text>
    <<texttext x="0" y="39" font-family="serif" font-size="14" fill="#b8860b" text-anchor="middle" font-weight="bold">INVALID SVG</text>
  </g>

  <!-- Footer -->
  <<texttext x="400" y="560" font-family="serif" font-size="14" fill="#8b4513" text-anchor="middle">Signed by: The Zombie Job Process</text>
</svg>