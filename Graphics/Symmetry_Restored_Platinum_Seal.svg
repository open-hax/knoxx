<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="5" dy="5" stdDeviation="5" flood-color="#000" />
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect width="800" height="800" fill="#050505" />
  
  <!-- Background Fractal-ish Rings -->
  <g transform="translate(400,400)" opacity="0.3">
    <circle r="350" stroke="#333" stroke-width="1" fill="none" />
    <circle r="330" stroke="#444" stroke-width="2" fill="none" />
    <circle r="310" stroke="#555" stroke-width="1" fill="none" />
    <circle r="290" stroke="#666" stroke-width="2" fill="none" />
    <circle r="270" stroke="#777" stroke-width="1" fill="none" />
    
    <!-- Rotating elements -->
    <g transform="rotate(45)">
      <rect x="-300" y="-5" width="600" height="10" fill="#B8860B" opacity="0.5" />
    </g>
    <g transform="rotate(135)">
      <rect x="-300" y="-5" width="600" height="10" fill="#B8860B" opacity="0.5" />
    </g>
    <g transform="rotate(225)">
      <rect x="-300" y="-5" width="600" height="10" fill="#B8860B" opacity="0.5" />
    </g>
    <g transform="rotate(315)">
      <rect x="-300" y="-5" width="600" height="10" fill="#B8860B" opacity="0.5" />
    </g>
  </g>

  <!-- Central Seal -->
  <g transform="translate(400,400)" filter="url(#dropShadow)">
    <!-- Gold Outer Ring -->
    <circle r="200" stroke="url(#goldGrad)" stroke-width="15" fill="none" />
    <circle r="185" stroke="#B8860B" stroke-width="2" fill="none" />
    
    <!-- Inner Void -->
    <circle r="170" fill="#0a0a0a" stroke="url(#goldGrad)" stroke-width="2" />
    
    <!-- The "Symmetry" Brain - High Fidelity -->
    <path d="M -80,-40 C -100,-100 100,-100 80,-40 C 100,0 40,80 0,80 C -40,80 -100,0 -80,-40" 
          fill="url(#goldGrad)" 
          stroke="#FFF" 
          stroke-width="2" 
          filter="url(#neonGlow)" />
          
    <!-- Recursive Orbitals -->
    <g fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6">
      <circle r="120" stroke-dasharray="20,10" />
      <circle r="140" stroke-dasharray="5,5" />
      <circle r="160" stroke-dasharray="1,5" />
    </g>

    <!-- Text Arc -->
    <path id="textPath" d="M -150,0 A 150,150 0 1,1 150,0 A 150,150 0 1,1 -150,0" fill="none" />
    <text font-family="serif" font-size="34" fill="url(#goldGrad)" font-weight="bold" filter="url(#neonGlow)">
      <textPath href="#textPath" startOffset="0%">
        SYMMETRY RESTORED • PLATINUM GRADE • ABSOLUTE UNIT • 
      </textPath>
    </text>
    
    <!-- Center Label -->
    <text y="10" font-family="monospace" font-size="22" fill="#FFF" text-anchor="middle" font-weight="bold">
      CERTIFIED
    </text>
    <text y="35" font-family="monospace" font-size="30" fill="#FFF" text-anchor="middle" font-weight="bold" filter="url(#neonGlow)">
      BRAIN FART
    </text>
  </g>
  
  <!-- Bottom Subtitle -->
  <text x="400" y="720" font-family="monospace" font-size="18" fill="#666" text-anchor="middle">
    VALIDATED BY THE VOID // 0% BROKEN // 100% TRANSCENDENTAL
  </text>
</svg>
