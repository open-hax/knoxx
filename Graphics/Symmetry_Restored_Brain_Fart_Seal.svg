<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="#1a1a2e" stroke="#4d4dff" stroke-width="8" />
  <circle cx="200" cy="200" r="170" fill="none" stroke="#4d4dff" stroke-width="2" stroke-dasharray="10,10" />
  
  <!-- Inner Glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#4d4dff" stop-opacity="0.3" />
    <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0" />
  </radialGradient>
  <circle cx="200" cy="200" r="150" fill="url(#glow)" />

  <!-- Text Path -->
  <defs>
    <path id="circlePath" d="M 200, 200 m -140, 0 a 140,140 0 1,1 280,0 a 140,140 0 1,1 -280,0" />
  </defs>
  <text fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold" letter-spacing="2">
    <textPath href="#circlePath" startOffset="0%">
      *** CERTIFIED BRAIN FART — SYMMETRY RESTORED — ZOMBIE JOB FREE ***
    </textPath>
  </text>

  <!-- The "Brain" / Component -->
  <!-- Left Hemispheres (Circuitry) -->
  <path d="M 200,120 Q 140,120 130,170 Q 120,230 160,260 Q 180,270 200,250" fill="none" stroke="#00ffcc" stroke-width="4" />
  <path d="M 160,150 L 140,150 L 130,170" fill="none" stroke="#00ffcc" stroke-width="2" />
  <circle cx="140" cy="150" r="3" fill="#00ffcc" />
  <circle cx="130" cy="170" r="3" fill="#00ffcc" />
  
  <!-- Right Hemispheres (Organic/Fluid) -->
  <path d="M 200,120 Q 260,120 270,170 Q 280,230 240,260 Q 220,270 200,250" fill="none" stroke="#ff00ff" stroke-width="4" />
  <path d="M 240,150 Q 250,140 260,160 Q 270,180 250,190" fill="none" stroke="#ff00ff" stroke-width="2" />
  
  <!-- The "Symmetry Break" Crack -->
  <path d="M 200,100 L 210,130 L 190,160 L 205,190 L 195,220 L 200,250" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  
  <!-- Center Symbol -->
  <rect x="185" y="185" width="30" height="30" fill="#4d4dff" stroke="#ffffff" stroke-width="2" rx="5" />
  <text x="192" y="205" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold">OK</text>

  <!-- Decorative Sparkles -->
  <circle cx="100" cy="100" r="2" fill="#ffffff" />
  <circle cx="300" cy="100" r="2" fill="#ffffff" />
  <circle cx="100" cy="300" r="2" fill="#ffffff" />
  <circle cx="300" cy="300" r="2" fill="#ffffff" />
</svg>
