name: ingestion-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - 'ingestion/**'
      - 'contracts/**'
      - '.github/workflows/ingestion-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'ingestion/**'
      - 'contracts/**'
      - '.github/workflows/ingestion-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingestion-test:
    name: ingestion (clojure unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ingestion

    env:
      # Keep tests hermetic — no real services expected.
      # Loader tests write temp dirs; no DB or Redis needed.
      CONTRACTS_DIR: ${{ github.workspace }}/contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clojure-deps-${{ hashFiles('ingestion/deps.edn') }}
          restore-keys: clojure-deps-

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Download deps
        run: clojure -P -A:test

      - name: Run tests
        run: clojure -M:test

      - name: Verify test exit
        if: failure()
        run: echo 'Tests failed — check output above.'
