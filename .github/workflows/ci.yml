name: knoxx-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  knoxx:
    name: knoxx (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Knoxx
        uses: actions/checkout@v5
        with:
          path: knoxx

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            knoxx/pnpm-lock.yaml

      # Knoxx is developed as a submodule inside the OpenPlanner workspace.
      # This workflow reconstructs that layout so the local link/file deps resolve.
      - name: Checkout OpenPlanner
        uses: actions/checkout@v5
        with:
          repository: open-hax/openplanner
          path: orgs/open-hax/openplanner
          fetch-depth: 1

      - name: Checkout UXX
        uses: actions/checkout@v5
        with:
          repository: open-hax/uxx
          path: orgs/open-hax/uxx
          fetch-depth: 1

      - name: Overlay Knoxx into OpenPlanner workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -rf orgs/open-hax/openplanner/packages/agents/knoxx
          mkdir -p orgs/open-hax/openplanner/packages/agents
          rsync -a --delete --exclude '.git' --exclude 'node_modules' knoxx/ orgs/open-hax/openplanner/packages/agents/knoxx/

      - name: Install (Knoxx workspace)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx install --frozen-lockfile

      - name: Backend typecheck (shadow-cljs compile app)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/backend run typecheck

      - name: Backend tests (cljs.test via shadow-cljs)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/backend test

      - name: Frontend typecheck (tsc)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/frontend run typecheck

      - name: Frontend tests (vitest)
        run: pnpm -C orgs/open-hax/openplanner/packages/agents/knoxx/frontend test
