name: knoxx-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  knoxx:
    name: knoxx (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Knoxx
        uses: actions/checkout@v5

      - name: Setup Java (required by shadow-cljs / Closure Compiler)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Closure Compiler artifacts used by shadow-cljs now require Java 21
          # (class file version 65).
          java-version: "21"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install (Knoxx workspace)
        run: pnpm install --frozen-lockfile

      - name: Backend typecheck (shadow-cljs compile app)
        run: pnpm -C backend run typecheck

      - name: Backend tests (cljs.test via shadow-cljs)
        run: pnpm -C backend test

      - name: Frontend typecheck (tsc)
        run: pnpm -C frontend run typecheck

      - name: Frontend tests (vitest)
        run: pnpm -C frontend test
