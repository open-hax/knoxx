name: knoxx-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  knoxx:
    name: knoxx (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Knoxx
        uses: actions/checkout@v5

      - name: Setup Java (required by shadow-cljs / Closure Compiler)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Closure Compiler artifacts used by shadow-cljs now require Java 21
          # (class file version 65).
          java-version: "21"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install (Knoxx workspace)
        run: pnpm install --frozen-lockfile

      - name: Backend typecheck (shadow-cljs compile app)
        run: pnpm -C backend run typecheck

      - name: Backend tests + coverage (cljs.test via shadow-cljs + c8)
        run: pnpm -C backend run test:coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: knoxx-backend-coverage
          path: backend/coverage
          if-no-files-found: error

      - name: Backend coverage summary
        run: node --input-type=module -e "import fs from 'node:fs'; const p='backend/coverage/coverage-summary.json'; const s=JSON.parse(fs.readFileSync(p,'utf8')).total; const f=(x)=>x?.pct??0; console.log('Backend coverage — Lines:',f(s.lines),'%','Statements:',f(s.statements),'%','Functions:',f(s.functions),'%','Branches:',f(s.branches),'%');"

      - name: Frontend typecheck (tsc)
        run: pnpm -C frontend run typecheck

      - name: Frontend tests + coverage (vitest)
        run: pnpm -C frontend run test:coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: knoxx-frontend-coverage
          path: frontend/coverage
          if-no-files-found: error

      - name: Coverage summary
        run: node --input-type=module -e "import fs from 'node:fs'; const p='frontend/coverage/coverage-summary.json'; const s=JSON.parse(fs.readFileSync(p,'utf8')).total; const f=(x)=>x?.pct??0; console.log('Lines:',f(s.lines),'%','Statements:',f(s.statements),'%','Functions:',f(s.functions),'%','Branches:',f(s.branches),'%');"
