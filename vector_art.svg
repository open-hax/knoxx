<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#000000" />
  
  <!-- Orbit paths (thin, subtle) -->
  <circle cx="200" cy="200" r="120" stroke="#333" stroke-width="2" fill="none" />
  
  <!-- Central Hub -->
  <circle cx="200" cy="200" r="40" fill="#FFD700" />
  <circle cx="200" cy="200" r="20" fill="#000" />
  <circle cx="200" cy="200" r="10" fill="#FFD700" />

  <!-- Geometric Nodes (Hexagons) -->
  <!-- Top node -->
  <g transform="translate(200, 80)">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="#FFD700" />
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#000" />
  </g>
  
  <!-- Bottom Left node -->
  <g transform="translate(100, 260) rotate(30)">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="#FFD700" />
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#000" />
  </g>
  
  <!-- Bottom Right node -->
  <g transform="translate(300, 260) rotate(-30)">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="#FFD700" />
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#000" />
  </g>

  <!-- Connecting Bold Lines -->
  <line x1="200" y1="200" x2="200" y2="80" stroke="#FFD700" stroke-width="8" stroke-linecap="round" />
  <line x1="200" y1="200" x2="100" y2="260" stroke="#FFD700" stroke-width="8" stroke-linecap="round" />
  <line x1="200" y1="200" x2="300" y2="260" stroke="#FFD700" stroke-width="8" stroke-linecap="round" />
</svg>
